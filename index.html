<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramais | Ferreira Costa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="telefone.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="alerta-onibus" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 33px; background-color: #16ca25; color: #000; align-items: center; justify-content: center; z-index: 10000; overflow: hidden;">
        <marquee scrollamount="10" style="width: 100%;">
            <span id="texto-alerta" style="font-size: 18px; text-transform: uppercase; font-weight: 400;"></span>
        </marquee>
    </div>

    <div class="fixed-top-container">
        <div id="clima-container" class="weather-bar">
            <span id="weather-info">🌤️ Recife agora: Carregando...</span>
        </div>
        
        <header class="header-brand">
            <div class="brand-name">
                <img src="https://d2urakutajlof6.cloudfront.net/logo/logo_fc.svg" alt="Ferreira Costa">
                <span>GUIA DE RAMAIS</span>
            </div>
            <button class="menu-icon" onclick="toggleMenu()">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </button>
        </header>

    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">MENU PRINCIPAL</div>
        
        <div class="sidebar-item" onclick="switchView('consulta')">🔍 Consultar Ramais</div>
        <div class="sidebar-item" onclick="prepareAdd()">➕ Novo Ramal</div>        
        <div class="sidebar-item" onclick="switchView('horarios')">🚌 Horários Ônibus</div>
        <div class="sidebar-item alert-item" onclick="toggleModal(true); toggleMenu()">🚨 ACIDENTE</div>
        
        <div class="mp-container">
            <div class="mp-info"><span id="mp-now-playing">Selecione uma música</span></div>
            <div class="mp-controls">
                <button onclick="mpStop()">⏹️</button>
                <button id="mp-play-pause" onclick="mpToggle()">▶️</button>
                <div class="mp-volume-wrapper" style="display: flex; align-items: center; width: 100%; padding: 10px 0;">
                    <input type="range" id="mp-volume" min="0" max="100" value="100" oninput="mpVolume(this.value)" style="width: 100%; cursor: pointer; accent-color: #ffcc00; height: 15px;">
                </div>
            </div>
            <div class="mp-tabs">
                <button class="mp-tab-btn active" onclick="mpFilter('todos')">Todos</button>
                <button class="mp-tab-btn" onclick="mpFilter('relax')">Relax</button>
                <button class="mp-tab-btn" onclick="mpFilter('foco')">Foco</button>
            </div>
            <div class="mp-playlist" id="mp-list"></div>
            <audio id="mainAudioPlayer"></audio>
        </div>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="localStorage.removeItem('fc_autorizado'); location.reload();">🚪 Sair</button>
        </div>
    </nav>

    <main class="container">
        
        <section id="view-consulta" class="view-section active">
            <div class="search-container">
                <input type="text" id="search" oninput="filtrar()" placeholder="Pesquisar nome ou setor..." autocomplete="off">
            </div>
            <div class="ramais-list">
                <table class="table-ramais">
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </section>

        <section id="view-horarios" class="view-section">
            <div class="sticky-header-view">
                <button class="btn-back" onclick="switchView('consulta', true)">← Voltar</button>
                <h2 class="section-title">🚌 Ônibus Translado</h2>
            </div>
            <div class="table-bus-wrapper">
                <table class="table-bus">
                    <thead><tr><th>Saída Estac.</th><th>Saída Loja</th></tr></thead>
                    <tbody id="corpoBus"></tbody>
                </table>
            </div>
        </section>

        <section id="view-form" class="view-section">
            <div class="sticky-header-view" style="padding: 15px; border-bottom: 2px solid #FFD400; display: flex; align-items: center; gap: 15px;">
                <button class="btn-back" onclick="switchView('consulta', true)" style="background:none; border:none; font-weight:800; color:#003399; cursor:pointer;">← CANCELAR</button>
                <h2 id="titulo-form" style="margin:0; font-size:1.2rem; color:#003399;">➕ Novo Ramal</h2>
            </div>

            <div style="padding: 20px; max-width: 500px; margin: 0 auto;">
                <input type="hidden" id="form-id">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-weight:700; font-size:12px; margin-bottom:5px;">NOME COMPLETO *</label>
                    <input type="text" id="form-nome" class="form-input" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;" placeholder="Ex: JOÃO SILVA">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-weight:700; font-size:12px; margin-bottom:5px;">SETOR *</label>
                    <input type="text" id="form-setor" class="form-input" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;" placeholder="Ex: PREVENÇÃO">
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display:block; font-weight:700; font-size:12px; margin-bottom:5px;">RAMAL *</label>
                    <input type="number" id="form-ramal" class="form-input" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;" placeholder="Ex: 8000">
                </div>
                
                <button onclick="saveData()" style="width:100%; padding:18px; background:#003399; color:white; font-weight:800; border:none; border-radius:8px; cursor:pointer; font-size:16px; margin-bottom: 10px;">
                    💾 SALVAR NO SISTEMA
                </button>

                <button onclick="switchView('consulta', true)" style="width:100%; padding:12px; background:#f1f5f9; color:#64748b; font-weight:700; border:none; border-radius:8px; cursor:pointer;">
                    CANCELAR
                </button>
            </div>
        </section>
    </main>

    <footer class="footer-fixed">🛡️ Prevenção de Perdas</footer>

    <div id="modalAcidente" class="modal-acidente">
        <div class="modal-acidente-content">
            <h2>🚨 Protocolo de Acidente</h2>
            <div class="lista-emergencia">
                <div class="item-emergencia">📞 Segurança: <strong>8578</strong></div>
                <div class="item-emergencia">📞 CFTV: <strong>8343</strong></div>
                <div class="item-emergencia">🚑 SAMU: <strong>192</strong></div>
            </div>
            <button class="btn-close-acidente" onclick="toggleModal(false)">FECHAR</button>
        </div>
    </div>

    <div class="ad-lateral ad-esquerda"><img src="https://marketplace.canva.com/EAFbJQDjaSA/1/0/900w/canva-feliz-p%C3%A1scoa-ousado-verde-e-marrom-de-chocolate-story-do-instagram-XjEs_qmrJYk.jpg"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

   
</body>
</html>
